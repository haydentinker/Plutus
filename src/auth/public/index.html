<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plutus — Connect Your Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #18181b;
      --border: rgba(255,255,255,0.08);
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --text: #fafafa;
      --text-muted: #71717a;
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container { width: 100%; max-width: 460px; }

    .header { margin-bottom: 36px; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #818cf8);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 0 20px rgba(99,102,241,0.35);
    }

    .subtitle { color: var(--text-muted); font-size: 14px; padding-left: 46px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }

    .card-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.2s ease;
    }

    .account-item:last-child { border-bottom: none; padding-bottom: 0; }
    .account-item:first-child { padding-top: 0; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .account-info { display: flex; align-items: center; gap: 12px; }

    .account-icon {
      width: 38px;
      height: 38px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .account-name { font-size: 14px; font-weight: 500; }
    .account-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .empty-state { text-align: center; padding: 20px 0 4px; }
    .empty-icon { font-size: 30px; margin-bottom: 8px; opacity: 0.5; }
    .empty-text { color: var(--text-muted); font-size: 13px; }

    /* Label form */
    .label-form { display: none; }
    .label-form.show { display: block; }

    .label-form .card-header { margin-bottom: 4px; }

    .label-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .label-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .label-input:focus { border-color: var(--accent); }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
    }

    .btn:active:not(:disabled) { transform: scale(0.98); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-save {
      background: var(--accent);
      color: #fff;
      padding: 10px 18px;
      width: auto;
      font-size: 14px;
      border-radius: 9px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-save:hover { background: var(--accent-hover); }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 11px;
      width: auto;
      border-radius: 7px;
      flex-shrink: 0;
    }

    .btn-ghost:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.5); }

    .status {
      margin-top: 12px;
      padding: 11px 14px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .status.show { display: flex; }
    .status.success { background: rgba(34,197,94,0.08); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .status.error   { background: rgba(239,68,68,0.08); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .status.info    { background: rgba(99,102,241,0.08); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(165,180,252,0.3);
      border-top-color: #a5b4fc;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.07) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    .plus-icon {
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.15);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <div class="logo-mark">◈</div>
        Plutus
      </div>
      <p class="subtitle">Connect your financial accounts</p>
    </header>

    <div class="card">
      <div class="card-header">Linked Accounts</div>
      <div id="accounts-list">
        <div class="skeleton" style="height:46px; border-radius:10px;"></div>
      </div>
    </div>

    <div id="label-form" class="card label-form">
      <div class="card-header">Name this account</div>
      <p class="label-hint">Give it a label so you can tell it apart (e.g. "Chase Personal").</p>
      <div class="input-row">
        <input id="label-input" class="label-input" type="text" placeholder="Account label" />
        <button id="save-btn" class="btn btn-save">Save Account</button>
      </div>
    </div>

    <button id="connect-btn" class="btn btn-primary">
      <span class="plus-icon">+</span>
      Connect Bank Account
    </button>

    <div id="status" class="status"></div>
  </div>

  <script>
    var connectBtn = document.getElementById('connect-btn');
    var accountsList = document.getElementById('accounts-list');
    var statusEl = document.getElementById('status');
    var labelForm = document.getElementById('label-form');
    var labelInput = document.getElementById('label-input');
    var saveBtn = document.getElementById('save-btn');

    // Pending link data waiting for label confirmation
    var pending = null;

    function showStatus(msg, type) {
      type = type || 'info';
      statusEl.className = 'status show ' + type;
      statusEl.innerHTML = type === 'info'
        ? '<div class="spinner"></div><span>' + msg + '</span>'
        : '<span>' + (type === 'success' ? '✓' : '✗') + '</span><span>' + msg + '</span>';
    }

    function hideStatus() { statusEl.className = 'status'; }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderAccounts(accounts) {
      if (!accounts.length) {
        accountsList.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-icon">🏦</div>' +
            '<p class="empty-text">No accounts linked yet</p>' +
          '</div>';
        return;
      }

      accountsList.innerHTML = accounts.map(function(a) {
        var subtitle = a.label !== a.institution_name
          ? esc(a.institution_name) + ' · Added ' + formatDate(a.added_at)
          : 'Added ' + formatDate(a.added_at);
        return (
          '<div class="account-item" id="acct-' + esc(a.item_id) + '">' +
            '<div class="account-info">' +
              '<div class="account-icon">🏦</div>' +
              '<div>' +
                '<div class="account-name">' + esc(a.label) + '</div>' +
                '<div class="account-sub">' + subtitle + '</div>' +
              '</div>' +
            '</div>' +
            '<button class="btn btn-ghost" data-remove data-item-id="' + esc(a.item_id) + '" data-name="' + esc(a.label) + '">Remove</button>' +
          '</div>'
        );
      }).join('');
    }

    async function loadAccounts() {
      try {
        var res = await fetch('/api/accounts').then(function(r) { return r.json(); });
        renderAccounts(res.accounts);
      } catch (e) {
        accountsList.innerHTML = '<p class="empty-text" style="padding:8px 0">Failed to load accounts.</p>';
      }
    }

    accountsList.addEventListener('click', async function(e) {
      var btn = e.target.closest('[data-remove]');
      if (!btn) return;
      var itemId = btn.dataset.itemId;
      var name = btn.dataset.name;
      if (!confirm('Remove ' + name + '?')) return;

      try {
        await fetch('/api/accounts/' + encodeURIComponent(itemId), { method: 'DELETE' });
        var el = document.getElementById('acct-' + itemId);
        if (el) el.remove();
        if (!accountsList.querySelector('.account-item')) renderAccounts([]);
      } catch (e) {
        showStatus('Failed to remove account.', 'error');
      }
    });

    saveBtn.addEventListener('click', async function() {
      if (!pending) return;
      var label = labelInput.value.trim() || pending.institution_name;

      saveBtn.disabled = true;
      showStatus('Saving ' + label + '…');

      try {
        var exchange = await fetch('/api/exchange-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            public_token: pending.public_token,
            institution_name: pending.institution_name,
            label: label,
          }),
        }).then(function(r) { return r.json(); });

        if (exchange.error) throw new Error(exchange.error);

        pending = null;
        labelForm.classList.remove('show');
        labelInput.value = '';
        connectBtn.disabled = false;
        showStatus(label + ' linked successfully!', 'success');
        await loadAccounts();
      } catch (err) {
        showStatus(err.message || 'Failed to save account.', 'error');
      } finally {
        saveBtn.disabled = false;
      }
    });

    labelInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveBtn.click();
    });

    connectBtn.addEventListener('click', async function() {
      connectBtn.disabled = true;
      showStatus('Opening Plaid Link…');

      try {
        var res = await fetch('/api/create-link-token', { method: 'POST' }).then(function(r) { return r.json(); });
        if (res.error) throw new Error(res.error);

        var handler = Plaid.create({
          token: res.link_token,
          onSuccess: function(public_token, metadata) {
            var institution_name = (metadata && metadata.institution && metadata.institution.name) || 'Bank Account';
            pending = { public_token: public_token, institution_name: institution_name };
            labelInput.value = institution_name;
            labelForm.classList.add('show');
            hideStatus();
            labelInput.focus();
            labelInput.select();
          },
          onExit: function(err) {
            connectBtn.disabled = false;
            if (err) {
              showStatus('Connection cancelled.', 'error');
            } else {
              hideStatus();
            }
          },
        });

        handler.open();
      } catch (err) {
        showStatus(err.message || 'Failed to start connection.', 'error');
        connectBtn.disabled = false;
      }
    });

    loadAccounts();
  </script>
</body>
</html>
